# .github/workflows/deploy.yml
name: Deploy Vite to GitHub Pages
on:
  # 触发条件：只有 master 分支推送时才触发
  push:
    branches: [master]
  # 允许手动触发
  workflow_dispatch:
# 设置 GITHUB_TOKEN 的权限，用于 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write
# 同一时间只允许一个部署流程运行，跳过排队中的运行
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 1. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      # 2. 安装 Node.js，并指定 pnpm 缓存
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      # 3. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # 4. 打包构建
      - name: Build
        run: pnpm run build
      # 5. 配置 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      # 6. 创建并部署静态站点
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 必须在 build 完成后执行
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
